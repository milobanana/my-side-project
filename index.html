<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>เกมสุ่มภารกิจ 🎲</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #a1c4fd, #c2e9fb);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
            touch-action: manipulation;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        .pop-in {
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .shaking {
            animation: shake 0.1s infinite;
            opacity: 0.7;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            25% { transform: translate(-1px, -2px) rotate(-1deg); }
            50% { transform: translate(-3px, 0px) rotate(1deg); }
            75% { transform: translate(3px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -1px) rotate(-1deg); }
        }
        
        .pulse-text { animation: pulse 2s infinite; }
        
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.7; }
        }

        #toast {
            transition: opacity 0.3s ease, transform 0.3s ease;
            transform: translateY(20px);
            opacity: 0;
            pointer-events: none;
        }
        #toast.show {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
</head>

<body class="h-screen w-screen flex flex-col items-center justify-center text-gray-800 relative">

    <!-- แจ้งเตือน (Toast) แทน alert() -->

        // UI elements moved up

        function generateRoomCode() {
            return Math.floor(1000 + Math.random() * 9000).toString();
        }

        function getRandomMission() {
            const idx = Math.floor(Math.random() * missions.length);
            return missions[idx];
        }

        function getRoomDocRef(roomId) {
            return doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId);
        }

        // เริ่มต้น Auth
        async function initAuth() {
            if (!isFirebaseReady) {
                uiLoading.classList.add('hidden');
                uiLobby.classList.remove('hidden');
                return;
            }
            try {
                await signInAnonymously(auth);
                localUserId = auth.currentUser.uid;
                uiLoading.classList.add('hidden');
                uiLobby.classList.remove('hidden');
            } catch (error) {
                console.error("Auth Error:", error);
                showToast("ไม่สามารถยืนยันตัวตนได้");
                uiLoading.classList.add('hidden');
                uiLobby.classList.remove('hidden');
            }
        }

        // ตรวจสอบชื่อ
        function validateName() {
            localPlayerName = inputPlayerName.value.trim();
            if (!localPlayerName) {
                showToast("กรุณากรอกชื่อของคุณด้วยนะ");
                return false;
            }
            // บันทึกชื่อลง LocalStorage
            localStorage.setItem('playerName', localPlayerName);
            return true;
        }

        // สร้างห้อง
        document.getElementById('btn-create-room').addEventListener('click', async () => {
            if (!validateName()) return;
            if (!isFirebaseReady || !localUserId) return showToast("ระบบออนไลน์ไม่พร้อมใช้งาน");
            
            uiLoading.classList.remove('hidden');
            const newRoomId = generateRoomCode();
            const docRef = getRoomDocRef(newRoomId);

            try {
                await setDoc(docRef, {
                    status: 'waiting',
                    text: 'รอเพื่อนเข้ามาจอย...',
                    players: {
                        [localUserId]: { name: localPlayerName }
                    },
                    currentRollerUid: null,
                    targetPlayerUid: null,
                    updatedAt: serverTimestamp()
                });

                joinRoomLocal(newRoomId);
            } catch (error) {
                console.error("Create room error:", error);
                showToast("สร้างห้องไม่สำเร็จ");
                uiLoading.classList.add('hidden');
            }
        });

        // เข้าห้อง
        document.getElementById('btn-join-room').addEventListener('click', async () => {
            if (!validateName()) return;
            const code = inputRoomCode.value.trim().toUpperCase();
            if (code.length !== 4) return showToast("กรุณากรอกรหัสห้อง 4 หลัก");
            if (!isFirebaseReady || !localUserId) return showToast("ระบบออนไลน์ไม่พร้อมใช้งาน");

            uiLoading.classList.remove('hidden');
            const docRef = getRoomDocRef(code);

            try {
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    const players = data.players || {};
                    const pKeys = Object.keys(players);

                    if (pKeys.length >= 2 && !players[localUserId]) {
                        showToast("ห้องนี้มีผู้เล่นครบแล้ว");
                        uiLoading.classList.add('hidden');
                        return;
                    }

                    let updates = {};
                    updates[`players.${localUserId}`] = { name: localPlayerName };
                    
                    if (pKeys.length === 1 && !players[localUserId]) {
                        const p1Uid = pKeys[0];
                        const firstRoller = Math.random() < 0.5 ? p1Uid : localUserId;
                        updates.currentRollerUid = firstRoller;
                        updates.status = 'idle';
                        updates.text = 'พร้อมแล้ว! เริ่มสุ่มได้เลย';
                    }

                    await updateDoc(docRef, updates);
                    joinRoomLocal(code);
                } else {
                    showToast("ไม่พบห้องนี้ กรุณาลองใหม่");
                    uiLoading.classList.add('hidden');
                }
            } catch (error) {
                console.error("Join room error:", error);
                showToast("เข้าร่วมห้องไม่สำเร็จ");
                uiLoading.classList.add('hidden');
            }
        });

        // ออกจากห้อง
        document.getElementById('btn-leave-room').addEventListener('click', async () => {
            if (currentRoomId && localUserId) {
                const docRef = getRoomDocRef(currentRoomId);
                try {
                    await updateDoc(docRef, {
                        [`players.${localUserId}`]: deleteField()
                    });
                } catch (e) {
                    console.error("Error leaving room:", e);
                }
            }
            
            if (unsubscribeSnapshot) {
                unsubscribeSnapshot();
                unsubscribeSnapshot = null;
            }
            currentRoomId = null;
            previousPlayers = {};
            uiGame.classList.add('hidden');
            uiLobby.classList.remove('hidden');
            inputRoomCode.value = '';
            stopLocalRollingAnimation(); 
        });

        // จัดการ UI ห้อง
        function joinRoomLocal(roomId) {
            currentRoomId = roomId;
            displayRoomCode.textContent = roomId;
            
            uiLobby.classList.add('hidden');
            uiLoading.classList.add('hidden');
            uiGame.classList.remove('hidden');

            listenToRoom(roomId);
        }

        function listenToRoom(roomId) {
            const docRef = getRoomDocRef(roomId);
            
            unsubscribeSnapshot = onSnapshot(docRef, { includeMetadataChanges: true }, (docSnap) => {
                if (!docSnap.exists()) return;
                
                // ถ้ารอข้อมูลจากเซิร์ฟเวอร์ ให้ข้ามไปก่อน เพื่อแก้ปัญหาเครื่องคนกดหมุนไปก่อนแต่เครื่องอีกคนไม่อัปเดตเมื่อเน็ตกระตุก
                if (docSnap.metadata.hasPendingWrites) return;
                
                const data = docSnap.data();
                
                globalTargetUid = data.targetPlayerUid || null;
                globalTargetStreak = data.targetStreak || 0;
                roomPlayers = data.players || {};
                
                // แจ้งเตือนเมื่อมีคนออกจากห้อง
                if (Object.keys(previousPlayers).length > 0) {
                    for (const uid in previousPlayers) {
                        if (!roomPlayers[uid]) {
                            showToast(`ผู้เล่น ${previousPlayers[uid].name} ออกจากห้องไปแล้ว`, true);
                        }
                    }
                }
                previousPlayers = { ...roomPlayers };
                
                const pKeys = Object.keys(roomPlayers);
                
                // อัปเดตรายชื่อผู้เล่น
                if (pKeys.length > 0) p1NameEl.textContent = roomPlayers[pKeys[0]].name;
                else p1NameEl.textContent = "รอผู้เล่น...";
                
                if (pKeys.length > 1) p2NameEl.textContent = roomPlayers[pKeys[1]].name;
                else p2NameEl.textContent = "รอผู้เล่น...";

                // สถานะตาใครกด
                amICurrentRoller = (data.currentRollerUid === localUserId);
                const currentRollerName = data.currentRollerUid ? roomPlayers[data.currentRollerUid]?.name : '';

                if (pKeys.length < 2) {
                    turnIndicator.innerHTML = `<span class="bg-gray-600 text-white px-4 py-1.5 rounded-full text-sm shadow-md">รอเพื่อนเข้าห้องให้ครบ...</span>`;
                    clickHint.textContent = "รอเพื่อนเข้าห้อง...";
                    clickHint.parentElement.classList.remove('pulse-text');
                } else {
                    if (amICurrentRoller) {
                        turnIndicator.innerHTML = `<span class="bg-green-500 text-white px-4 py-1.5 rounded-full text-sm font-bold shadow-md animate-bounce inline-block">🎯 ตาของคุณกดสุ่ม!</span>`;
                        clickHint.textContent = "👆 แตะหน้าจอเพื่อสุ่มเลย";
                        clickHint.parentElement.classList.add('pulse-text');
                    } else {
                        turnIndicator.innerHTML = `<span class="bg-indigo-500 text-white px-4 py-1.5 rounded-full text-sm shadow-md">รอ ${currentRollerName} กดสุ่ม...</span>`;
                        clickHint.textContent = `รอ ${currentRollerName} กดสุ่ม...`;
                        clickHint.parentElement.classList.remove('pulse-text');
                    }
                }

                // จัดการแบบใหม่: ควบคุมเวลาแอนิเมชันในเครื่องตัวเอง
                if (data.rollId && data.rollId !== lastSeenRollId) {
                    lastSeenRollId = data.rollId;
                    
                    startLocalRollingAnimation();
                    
                    // ตั้งเวลาหยุดเป๊ะๆ 2 วินาทีในเครื่องแต่ละคน
                    localRollingTimeout = setTimeout(() => {
                        stopLocalRollingAnimation(data.text, data.targetPlayerUid);
                    }, 2000);
                } else if (!data.rollId && !isRollingAnimationActive) {
                    // สถานะก่อนเริ่มเกม
                    questionText.innerHTML = `<span class="font-bold text-indigo-900">${data.text || ''}</span>`;
                } else if (data.rollId === lastSeenRollId && !isRollingAnimationActive) {
                    // กรณีคนเข้าห้องมาทีหลัง หรือรีเฟรชหน้าเว็บ ให้โชว์ผลลัพธ์ล่าสุดได้เลย
                    stopLocalRollingAnimation(data.text, data.targetPlayerUid);
                }
            }, (error) => {
                console.error("Snapshot error:", error);
                showToast("การเชื่อมต่อขาดหาย");
            });
        }

        // ฟังก์ชันเริ่มแอนิเมชันสุ่ม
        function startLocalRollingAnimation() {
            if (localRollingInterval) clearInterval(localRollingInterval);
            if (localRollingTimeout) clearTimeout(localRollingTimeout);
            
            isRollingAnimationActive = true;
            questionText.classList.remove('pop-in');
            turnIndicator.classList.add('opacity-0');
            clickHint.parentElement.classList.add('opacity-0');
            
            questionText.classList.add('shaking');
            
            const pKeys = Object.keys(roomPlayers);
            if (pKeys.length === 0) return;

            localRollingInterval = setInterval(() => {
                questionText.innerHTML = `<span class="opacity-50">${getRandomMission()}</span>`;
            }, 150);
        }

        // กดสุ่ม (Touch Area)
        document.getElementById('touch-area').addEventListener('click', async () => {
            // ระบบห้องออนไลน์สุ่มผ่านเซิร์ฟเวอร์
            const pKeys = Object.keys(roomPlayers);
            if (pKeys.length < 2) {
                showToast("รอเพื่อนเข้าห้องให้ครบ 2 คนก่อนกดสุ่มนะ");
                return;
            }

            if (!amICurrentRoller) {
                const currentRollerName = roomPlayers[pKeys.find(k => k !== localUserId)]?.name || "เพื่อน";
                showToast(`ยังไม่ถึงตาของคุณครับ รอคุณ ${currentRollerName} กดสุ่ม`);
                return;
            }

            if (isRollingAnimationActive || isRequestingRoll) return;
            
            isRequestingRoll = true;

            const docRef = getRoomDocRef(currentRoomId);
            try {
                const finalMission = getRandomMission();
                let targetUid;

                // ถ้าคนก่อนหน้าโดนมาแล้ว 2 รอบติด รอบนี้บังคับเปลี่ยนคน
                if (globalTargetUid && globalTargetStreak >= 2) {
                    const otherPlayers = pKeys.filter(k => k !== globalTargetUid);
                    if (otherPlayers.length > 0) {
                        targetUid = otherPlayers[Math.floor(Math.random() * otherPlayers.length)];
                    } else {
                        targetUid = pKeys[Math.floor(Math.random() * pKeys.length)];
                    }
                } else {
                    targetUid = pKeys[Math.floor(Math.random() * pKeys.length)];
                }

                const newStreak = (targetUid === globalTargetUid) ? globalTargetStreak + 1 : 1;
                const newRollId = Date.now().toString() + Math.floor(Math.random()*1000);

                // ส่งคำสั่งยิงไปครั้งเดียว ทั้ง A และ B จะจำลองแอนิเมชัน 2 วินาทีในเครื่องตัวเอง ทำให้ไม่มีใครค้าง
                await updateDoc(docRef, {
                    rollId: newRollId,
                    text: finalMission,
                    targetPlayerUid: targetUid,
                    currentRollerUid: targetUid,
                    targetStreak: newStreak,
                    updatedAt: serverTimestamp()
                });
            } catch (error) {
                console.error("Error during rolling:", error);
                showToast("เกิดข้อผิดพลาดในการสุ่มออนไลน์");
            } finally {
                // ปลดล็อคการกดเพื่อป้องกันการกดซ้ำรัวๆ
                setTimeout(() => { isRequestingRoll = false; }, 1000);
            }
        });

        // หยุดอนิเมชันพร้อมแสดงผลลัพธ์แยกตามบทบาท (ผู้ตอบจะไม่เห็นคำถาม)
        function stopLocalRollingAnimation(finalText, targetUid) {
            isRollingAnimationActive = false;
            if (localRollingInterval) clearInterval(localRollingInterval);
            if (localRollingTimeout) clearTimeout(localRollingTimeout);
            localRollingInterval = null;
            localRollingTimeout = null;
            
            const targetName = roomPlayers[targetUid]?.name || 'ไม่ทราบชื่อ';
            
            if (targetUid) {
                // ระบบออนไลน์จริง
                if (targetUid === localUserId) {
                    questionText.innerHTML = `
                        <div class="flex flex-col items-center gap-2 p-2">
                            <div class="text-4xl animate-bounce">🔒</div>
                            <span class="font-bold text-gray-500 text-base md:text-xl">ภารกิจถูกซ่อนไว้!</span>
                            <span class="text-sm font-normal text-gray-400">คุณมีหน้าที่ต้องทำ/ตอบ รอเพื่อนอ่านออกเสียงให้ฟังนะ 🤫</span>
                        </div>
                    `;
                } else {
                    questionText.innerHTML = `
                        <div class="flex flex-col items-center gap-1">
                             <div class="text-4xl animate-bounce">📢</div>
                            <span class="text-sm md:text-base font-medium tracking-wide text-indigo-400">อ่านคำถามนี้ให้เพื่อนฟัง</span>
                            <span class="font-bold text-indigo-900 text-lg md:text-2xl leading-relaxed mt-1">${finalText}</span>
                        </div>
                    `;
                }
            } else {
                if (finalText) {
                    questionText.innerHTML = `<span class="font-bold text-indigo-900">${finalText}</span>`;
                }
            }
            
            questionText.classList.remove('shaking');
            turnIndicator.classList.remove('opacity-0');
            clickHint.parentElement.classList.remove('opacity-0');
            
            void questionText.offsetWidth; // trigger reflow
            
            questionText.classList.add('pop-in');
        }

        initAuth();

    </script>
</body>
</html>
